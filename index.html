<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>リンのコーデアプリ</title>
<style>
/* ===== CSS変数・リセット ===== */
:root {
  --bg: #FFF8F0;
  --card: #FFFFFF;
  --primary: #FF8FAB;
  --primary-dark: #E5758F;
  --secondary: #A8D8EA;
  --accent: #FFD166;
  --accent2: #B8E6C8;
  --text: #3D3D3D;
  --text-light: #888;
  --danger: #FF6B6B;
  --border: #F0E6DC;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
  --radius: 16px;
  --nav-h: 64px;
  --header-h: 52px;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  font-family: 'Hiragino Sans','Hiragino Kaku Gothic ProN','Noto Sans JP','Yu Gothic',sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  padding-bottom: calc(var(--nav-h) + 16px);
  padding-top: var(--header-h);
  overflow-x: hidden;
}
button { font-family: inherit; cursor: pointer; border: none; }
input, select, textarea { font-family: inherit; font-size: 16px; }

/* ===== ヘッダー ===== */
.app-header {
position: fixed; top:0; left:0; right:0; z-index:100;
height: var(–header-h);
background: linear-gradient(135deg, var(–primary), #FFB3C6);
display: flex; align-items: center; justify-content: center;
color: #fff; font-size: 18px; font-weight: 700;
letter-spacing: 1px;
box-shadow: 0 2px 8px rgba(255,143,171,0.3);
}
.app-header .header-icon { font-size: 22px; margin-right: 6px; }
.header-right {
position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
}
.header-right button {
background: rgba(255,255,255,0.25); color: #fff;
border-radius: 8px; padding: 6px 10px; font-size: 12px;
}

/* ===== 下部ナビ ===== */
.bottom-nav {
position: fixed; bottom:0; left:0; right:0; z-index:100;
height: var(–nav-h);
background: var(–card);
border-top: 1px solid var(–border);
display: flex; align-items: center; justify-content: space-around;
box-shadow: 0 -2px 12px rgba(0,0,0,0.06);
padding-bottom: env(safe-area-inset-bottom, 0);
}
.nav-btn {
flex:1; display:flex; flex-direction:column; align-items:center; gap:2px;
background:none; color: var(–text-light); font-size:10px; padding:6px 0;
transition: color .2s;
}
.nav-btn.active { color: var(–primary); }
.nav-btn .nav-icon { font-size: 24px; line-height:1; }

/* ===== 画面共通 ===== */
.screen { display:none; padding:12px 12px 20px; max-width:480px; margin:0 auto; }
.screen.active { display:block; }

/* ===== カード ===== */
.card {
background: var(–card); border-radius: var(–radius);
box-shadow: var(–shadow); padding: 16px; margin-bottom: 12px;
}
.card-title {
font-size: 15px; font-weight: 700; margin-bottom: 10px;
display: flex; align-items: center; gap: 6px;
}

/* ===== ボタン共通 ===== */
.btn {
display: inline-flex; align-items: center; justify-content: center; gap: 6px;
padding: 14px 20px; border-radius: 12px;
font-size: 16px; font-weight: 600;
transition: transform .1s, box-shadow .2s;
min-height: 48px;
}
.btn:active { transform: scale(0.96); }
.btn-primary {
background: linear-gradient(135deg, var(–primary), #FFB3C6);
color: #fff; box-shadow: 0 4px 12px rgba(255,143,171,0.3);
width: 100%;
}
.btn-secondary {
background: var(–secondary); color: var(–text);
box-shadow: 0 2px 8px rgba(168,216,234,0.3);
}
.btn-accent {
background: var(–accent); color: var(–text);
box-shadow: 0 2px 8px rgba(255,209,102,0.3);
}
.btn-danger {
background: var(–danger); color: #fff;
box-shadow: 0 2px 8px rgba(255,107,107,0.3);
}
.btn-outline {
background: transparent; border: 2px solid var(–primary);
color: var(–primary);
}
.btn-sm { padding: 8px 14px; font-size: 13px; min-height: 36px; border-radius: 10px; }
.btn-group { display: flex; gap: 8px; flex-wrap: wrap; }

/* ===== フォーム ===== */
.form-group { margin-bottom: 14px; }
.form-label {
display: block; font-size: 13px; font-weight: 600;
margin-bottom: 4px; color: var(–text);
}
.form-label .required {
color: var(–danger); font-size: 11px; margin-left: 4px;
}
.form-input, .form-select {
width: 100%; padding: 12px 14px; border: 2px solid var(–border);
border-radius: 12px; background: #FEFCFA; font-size: 16px;
transition: border-color .2s;
}
.form-input:focus, .form-select:focus {
outline: none; border-color: var(–primary);
}
.form-error { color: var(–danger); font-size: 12px; margin-top: 4px; display: none; }
.form-error.show { display: block; }

/* ===== チップ・タグ ===== */
.chip {
display: inline-flex; align-items: center; gap: 4px;
padding: 6px 12px; border-radius: 20px;
font-size: 13px; font-weight: 500; cursor: pointer;
border: 2px solid var(–border); background: var(–card);
transition: all .2s;
}
.chip.active { border-color: var(–primary); background: #FFF0F3; color: var(–primary-dark); }
.chip-group { display: flex; flex-wrap: wrap; gap: 6px; }
.tag {
display: inline-block; padding: 2px 8px; border-radius: 8px;
font-size: 11px; font-weight: 600;
}
.tag-wash { background: #E3F2FD; color: #1976D2; }
.tag-fav { background: #FFF3E0; color: #E65100; }

/* ===== 写真 ===== */
.photo-placeholder {
width: 100%; aspect-ratio: 1; border-radius: 12px;
background: linear-gradient(135deg, #F5E6FF, #E3F2FD);
display: flex; flex-direction: column; align-items: center; justify-content: center;
color: var(–text-light); font-size: 14px; gap: 4px;
overflow: hidden;
}
.photo-placeholder img {
width: 100%; height: 100%; object-fit: cover; border-radius: 12px;
}
.photo-placeholder .placeholder-icon { font-size: 36px; }

/* ===== ホーム画面 ===== */
.greeting { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
.greeting-sub { font-size: 13px; color: var(–text-light); margin-bottom: 16px; }
.weather-grid {
display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px;
}
.temp-display {
text-align: center; padding: 10px; background: #FFF5F5; border-radius: 12px;
}
.temp-display .temp-val { font-size: 28px; font-weight: 700; color: var(–primary-dark); }
.temp-display .temp-label { font-size: 11px; color: var(–text-light); }
.condition-checks { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
.condition-check {
display: flex; align-items: center; gap: 6px;
padding: 8px 12px; border-radius: 10px;
font-size: 13px; cursor: pointer;
border: 2px solid var(–border); background: var(–card);
transition: all .2s;
}
.condition-check.active { border-color: var(–danger); background: #FFF0F0; }
.condition-check input { display: none; }
.stats-row {
display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
margin-bottom: 12px;
}
.stat-card {
text-align: center; padding: 10px 6px;
background: var(–card); border-radius: 12px;
box-shadow: var(–shadow);
}
.stat-val { font-size: 22px; font-weight: 700; color: var(–primary); }
.stat-label { font-size: 10px; color: var(–text-light); margin-top: 2px; }

/* ===== 提案画面 ===== */
.proposal-card {
background: var(–card); border-radius: var(–radius);
box-shadow: var(–shadow); margin-bottom: 16px; overflow: hidden;
}
.proposal-header {
padding: 10px 16px; font-weight: 700; font-size: 15px;
display: flex; align-items: center; gap: 6px;
}
.proposal-header.p1 { background: linear-gradient(135deg, #FFE0E6, #FFF0F3); }
.proposal-header.p2 { background: linear-gradient(135deg, #E0F0FF, #F0F8FF); }
.proposal-header.p3 { background: linear-gradient(135deg, #E8FFE8, #F0FFF0); }
.proposal-items {
display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
padding: 12px;
}
.proposal-item { text-align: center; }
.proposal-item .item-cat { font-size: 11px; color: var(–text-light); margin-bottom: 4px; }
.proposal-item .item-photo {
width: 100%; aspect-ratio: 1; border-radius: 10px;
overflow: hidden; background: linear-gradient(135deg, #F5E6FF, #E3F2FD);
margin-bottom: 4px;
}
.proposal-item .item-photo img {
width: 100%; height: 100%; object-fit: cover;
}
.proposal-item .item-name { font-size: 11px; font-weight: 600; line-height: 1.2; }
.proposal-reason {
padding: 8px 16px 6px; font-size: 12px; color: var(–text-light);
border-top: 1px solid var(–border); line-height: 1.4;
}
.proposal-actions { padding: 8px 16px 14px; }
.no-proposal {
text-align: center; padding: 32px 16px; color: var(–text-light);
}
.no-proposal .no-icon { font-size: 48px; margin-bottom: 8px; }

/* ===== 服一覧 ===== */
.filter-bar {
display: flex; gap: 6px; overflow-x: auto; padding-bottom: 8px;
-webkit-overflow-scrolling: touch; margin-bottom: 10px;
}
.filter-bar::-webkit-scrollbar { display: none; }
.clothes-grid {
display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;
}
.clothes-card {
background: var(–card); border-radius: var(–radius);
box-shadow: var(–shadow); overflow: hidden;
cursor: pointer; transition: transform .15s;
position: relative;
}
.clothes-card:active { transform: scale(0.97); }
.clothes-card .card-photo {
width: 100%; aspect-ratio: 1; overflow: hidden;
background: linear-gradient(135deg, #F5E6FF, #E3F2FD);
display: flex; align-items: center; justify-content: center;
position: relative;
}
.clothes-card .card-photo img {
width: 100%; height: 100%; object-fit: cover;
}
.clothes-card .card-badges {
position: absolute; top: 6px; right: 6px;
display: flex; flex-direction: column; gap: 4px;
}
.clothes-card .card-info { padding: 8px 10px; }
.clothes-card .card-name { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
.clothes-card .card-meta { font-size: 10px; color: var(–text-light); }
.badge {
display: inline-flex; align-items: center; justify-content: center;
width: 28px; height: 28px; border-radius: 50%;
font-size: 14px; background: rgba(255,255,255,0.9);
box-shadow: 0 1px 4px rgba(0,0,0,0.15);
}

/* ===== 服詳細モーダル ===== */
.modal-overlay {
display: none; position: fixed; inset: 0; z-index: 200;
background: rgba(0,0,0,0.5); align-items: flex-end; justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal-content {
background: var(–card); width: 100%; max-width: 480px;
border-radius: 20px 20px 0 0; padding: 20px 16px 32px;
max-height: 90dvh; overflow-y: auto;
animation: slideUp .25s ease-out;
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-handle {
width: 40px; height: 4px; border-radius: 2px;
background: var(–border); margin: 0 auto 16px;
}
.modal-photo {
width: 100%; max-height: 280px; border-radius: 14px;
overflow: hidden; margin-bottom: 14px;
background: linear-gradient(135deg, #F5E6FF, #E3F2FD);
display: flex; align-items: center; justify-content: center;
}
.modal-photo img { width: 100%; height: 100%; object-fit: cover; }
.modal-name { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
.modal-details {
display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px;
}
.detail-item { font-size: 13px; }
.detail-label { color: var(–text-light); font-size: 11px; }
.modal-actions { display: flex; flex-direction: column; gap: 8px; }

/* ===== 登録フォーム ===== */
.photo-upload {
width: 100%; aspect-ratio: 4/3; border-radius: 14px;
border: 3px dashed var(–border); cursor: pointer;
display: flex; flex-direction: column; align-items: center; justify-content: center;
gap: 6px; color: var(–text-light); font-size: 14px;
transition: border-color .2s; overflow: hidden;
background: #FEFCFA; position: relative;
}
.photo-upload:hover { border-color: var(–primary); }
.photo-upload img {
position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover;
}
.photo-upload .upload-icon { font-size: 36px; }
.photo-upload input { display: none; }
.color-options { display: flex; flex-wrap: wrap; gap: 6px; }
.color-opt {
width: 36px; height: 36px; border-radius: 50%;
border: 3px solid transparent; cursor: pointer;
transition: border-color .2s, transform .1s;
}
.color-opt.active { border-color: var(–primary); transform: scale(1.15); }
.color-opt:active { transform: scale(0.9); }

/* ===== 着用履歴 ===== */
.history-date {
font-size: 14px; font-weight: 700; margin: 12px 0 6px;
display: flex; align-items: center; gap: 6px;
}
.history-card {
background: var(–card); border-radius: var(–radius);
box-shadow: var(–shadow); padding: 10px; margin-bottom: 8px;
}
.history-items {
display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
}
.history-item { text-align: center; }
.history-item .h-photo {
width: 100%; aspect-ratio: 1; border-radius: 8px; overflow: hidden;
background: linear-gradient(135deg, #F5E6FF, #E3F2FD);
margin-bottom: 4px;
}
.history-item .h-photo img { width: 100%; height: 100%; object-fit: cover; }
.history-item .h-name { font-size: 11px; }
.consecutive-warn {
background: #FFF3E0; color: #E65100; padding: 6px 10px;
border-radius: 8px; font-size: 12px; margin-top: 6px;
display: flex; align-items: center; gap: 4px;
}

/* ===== トースト ===== */
.toast {
position: fixed; bottom: calc(var(–nav-h) + 20px);
left: 50%; transform: translateX(-50%) translateY(100px);
background: var(–text); color: #fff;
padding: 12px 24px; border-radius: 12px;
font-size: 14px; font-weight: 500; z-index: 300;
opacity: 0; transition: all .3s;
box-shadow: 0 4px 20px rgba(0,0,0,0.2);
white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ===== 確認ダイアログ ===== */
.confirm-overlay {
display: none; position: fixed; inset: 0; z-index: 250;
background: rgba(0,0,0,0.5); align-items: center; justify-content: center;
padding: 24px;
}
.confirm-overlay.show { display: flex; }
.confirm-box {
background: var(–card); border-radius: var(–radius);
padding: 24px; max-width: 320px; width: 100%; text-align: center;
}
.confirm-msg { font-size: 15px; margin-bottom: 18px; line-height: 1.5; }
.confirm-btns { display: flex; gap: 10px; }
.confirm-btns .btn { flex: 1; }

/* ===== ユーティリティ ===== */
.mb-8 { margin-bottom: 8px; }
.mb-12 { margin-bottom: 12px; }
.mt-12 { margin-top: 12px; }
.text-center { text-align: center; }
.flex-center { display: flex; align-items: center; justify-content: center; }
.gap-8 { gap: 8px; }

/* ===== 切り替えスイッチ ===== */
.toggle-wrap {
display: flex; align-items: center; gap: 10px; padding: 8px 0;
}
.toggle {
width: 50px; height: 28px; border-radius: 14px;
background: #DDD; position: relative; cursor: pointer;
transition: background .2s;
}
.toggle.on { background: var(–primary); }
.toggle .toggle-knob {
width: 24px; height: 24px; border-radius: 50%;
background: #fff; position: absolute; top: 2px; left: 2px;
transition: left .2s; box-shadow: 0 1px 4px rgba(0,0,0,0.2);
}
.toggle.on .toggle-knob { left: 24px; }
.toggle-label { font-size: 14px; }
</style>

</head>

<div class="form-group">

  </div>

</div>

<!-- 季節 -->
<div class="form-group">
  <label class="form-label">きせつ</label>
  <div class="chip-group" id="season-chips">

<!-- ===== トースト ===== -->

<div class="toast" id="toast"></div>

<script>
/* ================================================================
   リンのコーデアプリ - メインスクリプト
   ================================================================ */

// ===== 定数 =====
const STORAGE_CLOTHES = 'rin_clothes';
const STORAGE_HISTORY = 'rin_history';

const COLORS = [
  { id: 'white', name: 'しろ', hex: '#FFFFFF', border: '#DDD' },
  { id: 'black', name: 'くろ', hex: '#333333', border: '#333' },
  { id: 'gray', name: 'グレー', hex: '#999999', border: '#999' },
  { id: 'red', name: 'あか', hex: '#E53935', border: '#E53935' },
  { id: 'pink', name: 'ピンク', hex: '#EC407A', border: '#EC407A' },
  { id: 'orange', name: 'オレンジ', hex: '#FF9800', border: '#FF9800' },
  { id: 'yellow', name: 'きいろ', hex: '#FDD835', border: '#F9A825' },
  { id: 'green', name: 'みどり', hex: '#43A047', border: '#43A047' },
  { id: 'blue', name: 'あお', hex: '#1E88E5', border: '#1E88E5' },
  { id: 'navy', name: 'ネイビー', hex: '#283593', border: '#283593' },
  { id: 'purple', name: 'むらさき', hex: '#8E24AA', border: '#8E24AA' },
  { id: 'brown', name: 'ちゃいろ', hex: '#6D4C41', border: '#6D4C41' },
  { id: 'beige', name: 'ベージュ', hex: '#D7CCC8', border: '#BCAAA4' },
  { id: 'multi', name: 'カラフル', hex: 'linear-gradient(135deg,#E53935,#FDD835,#1E88E5,#43A047)', border: '#888' },
];

const CATEGORY_NAMES = { tops: 'トップス', bottoms: 'ボトムス', outer: 'アウター' };
const SEASON_NAMES = { all: 'オールシーズン', spring: 'はる', summer: 'なつ', autumn: 'あき', winter: 'ふゆ' };
const WEATHER_NAMES = { sunny: 'はれ', cloudy: 'くもり', rainy: 'あめ', snowy: 'ゆき' };

// ===== データ管理 =====
/** localStorage から服データを読み込む */
function loadClothes() {
  try {
    const raw = localStorage.getItem(STORAGE_CLOTHES);
    if (!raw) return [];
    const data = JSON.parse(raw);
    return Array.isArray(data) ? data : [];
  } catch (e) {
    console.warn('服データ読み込みエラー:', e);
    return [];
  }
}

/** localStorage に服データを書き込む */
function saveClothesData(clothes) {
  try {
    localStorage.setItem(STORAGE_CLOTHES, JSON.stringify(clothes));
  } catch (e) {
    console.error('服データ保存エラー:', e);
    showToast('ほぞんにしっぱいしました');
  }
}

/** 着用履歴を読み込む */
function loadHistory() {
  try {
    const raw = localStorage.getItem(STORAGE_HISTORY);
    if (!raw) return [];
    const data = JSON.parse(raw);
    return Array.isArray(data) ? data : [];
  } catch (e) {
    console.warn('履歴読み込みエラー:', e);
    return [];
  }
}

/** 着用履歴を保存する */
function saveHistoryData(history) {
  try {
    localStorage.setItem(STORAGE_HISTORY, JSON.stringify(history));
  } catch (e) {
    console.error('履歴保存エラー:', e);
    showToast('きろくのほぞんにしっぱいしました');
  }
}

// ===== 画面切り替え =====
function switchScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const target = document.getElementById('screen-' + name);
  if (target) target.classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.screen === name);
  });
  // 画面固有の初期化
  if (name === 'home') refreshHome();
  if (name === 'list') renderClothesList();
  if (name === 'history') renderHistory();
  if (name === 'register') {
    // 新規登録モードにリセット（編集中でなければ）
    if (!document.getElementById('edit-id').value) {
      resetRegisterForm();
    }
  }
  window.scrollTo(0, 0);
}

// ===== トースト =====
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ===== 確認ダイアログ =====
let confirmResolve = null;
function showConfirm(msg) {
  return new Promise(resolve => {
    confirmResolve = resolve;
    document.getElementById('confirm-msg').textContent = msg;
    document.getElementById('confirm-dialog').classList.add('show');
  });
}
function closeConfirm(result) {
  document.getElementById('confirm-dialog').classList.remove('show');
  if (confirmResolve) { confirmResolve(result); confirmResolve = null; }
}

// ===== ホーム画面 =====
function refreshHome() {
  // 挨拶を時間帯で変える
  const h = new Date().getHours();
  const greetEl = document.getElementById('greeting-text');
  const subEl = document.getElementById('greeting-sub');
  if (h < 10) { greetEl.textContent = 'おはよう、リン！'; subEl.textContent = 'きょうはなにをきようかな？'; }
  else if (h < 15) { greetEl.textContent = 'こんにちは、リン！'; subEl.textContent = 'あしたのじゅんびをしよう！'; }
  else { greetEl.textContent = 'こんばんは、リン！'; subEl.textContent = 'あしたのふくをきめちゃおう！'; }

  // 統計
  const clothes = loadClothes();
  const history = loadHistory();
  const available = clothes.filter(c => !c.washing).length;
  document.getElementById('stat-total').textContent = clothes.length;
  document.getElementById('stat-available').textContent = available;
  document.getElementById('stat-history').textContent = history.length;

  // 最近の履歴（直近3件）
  renderRecentHistory();
}

function renderRecentHistory() {
  const container = document.getElementById('recent-history');
  const history = loadHistory();
  if (history.length === 0) {
    container.innerHTML = '<p style="font-size:13px; color:var(--text-light); text-align:center; padding:8px;">まだきろくがないよ</p>';
    return;
  }
  const recent = history.slice(0, 3);
  const clothes = loadClothes();
  let html = '';
  recent.forEach(rec => {
    const dateStr = formatDate(rec.date);
    html += `<div style="margin-bottom:8px;"><div style="font-size:12px; color:var(--text-light); margin-bottom:4px;">${dateStr}</div>`;
    html += '<div style="display:flex; gap:6px;">';
    ['tops','bottoms','outer'].forEach(cat => {
      const id = rec[cat];
      if (!id) return;
      const item = clothes.find(c => c.id === id);
      if (!item) return;
      html += `<div style="flex:1; text-align:center;">
        <div style="width:100%; aspect-ratio:1; border-radius:8px; overflow:hidden; background:linear-gradient(135deg,#F5E6FF,#E3F2FD); margin-bottom:2px;">
          ${item.photo ? `<img src="${item.photo}" style="width:100%;height:100%;object-fit:cover;">` : `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:24px;">👕</div>`}
        </div>
        <div style="font-size:10px;">${item.name}</div>
      </div>`;
    });
    html += '</div></div>';
  });
  container.innerHTML = html;
}

// ===== 色選択UI初期化 =====
function initColorOptions() {
  const container = document.getElementById('color-options');
  let html = '';
  COLORS.forEach(c => {
    const bg = c.id === 'multi' ? c.hex : c.hex;
    const style = c.id === 'multi'
      ? `background:${c.hex}; border-color:${c.border};`
      : `background:${c.hex}; border-color:${c.border};`;
    html += `<div class="color-opt" data-color="${c.id}" title="${c.name}" style="${style}" onclick="selectColor('${c.id}', this)"></div>`;
  });
  container.innerHTML = html;
}

function selectColor(colorId, el) {
  document.querySelectorAll('#color-options .color-opt').forEach(o => o.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('reg-color').value = colorId;
}

// ===== 季節選択 =====
function selectSeason(season, el) {
  document.querySelectorAll('#season-chips .chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
}

// ===== 写真選択 =====
function handlePhotoSelect(event) {
  const file = event.target.files[0];
  if (!file) return;
  if (!file.type.startsWith('image/')) {
    showToast('がぞうファイルをえらんでね');
    return;
  }
  // 5MB制限
  if (file.size > 5 * 1024 * 1024) {
    showToast('ファイルがおおきすぎるよ（5MBまで）');
    return;
  }
  const reader = new FileReader();
  reader.onload = function(e) {
    const uploadEl = document.getElementById('photo-upload');
    // 既存のimgがあれば削除
    const existingImg = uploadEl.querySelector('img');
    if (existingImg) existingImg.remove();
    const img = document.createElement('img');
    img.src = e.target.result;
    uploadEl.appendChild(img);
    uploadEl.dataset.photo = e.target.result;
  };
  reader.readAsDataURL(file);
}

// ===== 服登録フォームリセット =====
function resetRegisterForm() {
  document.getElementById('edit-id').value = '';
  document.getElementById('register-title').textContent = '👕 ふくをとうろく';
  document.getElementById('reg-name').value = '';
  document.getElementById('reg-category').value = '';
  document.getElementById('reg-color').value = '';
  document.querySelectorAll('#color-options .color-opt').forEach(o => o.classList.remove('active'));
  document.querySelectorAll('#season-chips .chip').forEach(c => c.classList.remove('active'));
  document.querySelector('#season-chips .chip[data-season="all"]').classList.add('active');
  document.getElementById('reg-washing').classList.remove('on');
  document.getElementById('reg-fav').classList.remove('on');
  const uploadEl = document.getElementById('photo-upload');
  const existingImg = uploadEl.querySelector('img');
  if (existingImg) existingImg.remove();
  uploadEl.dataset.photo = '';
  document.getElementById('photo-input').value = '';
  // エラー非表示
  document.querySelectorAll('.form-error').forEach(e => e.classList.remove('show'));
}

// ===== 服登録保存 =====
function saveClothing() {
  let valid = true;
  const name = document.getElementById('reg-name').value.trim();
  const category = document.getElementById('reg-category').value;
  const color = document.getElementById('reg-color').value;
  const seasonEl = document.querySelector('#season-chips .chip.active');
  const season = seasonEl ? seasonEl.dataset.season : 'all';
  const washing = document.getElementById('reg-washing').classList.contains('on');
  const fav = document.getElementById('reg-fav').classList.contains('on');
  const photo = document.getElementById('photo-upload').dataset.photo || '';
  const editId = document.getElementById('edit-id').value;

  // バリデーション
  if (!name) {
    document.getElementById('err-name').classList.add('show');
    valid = false;
  } else {
    document.getElementById('err-name').classList.remove('show');
  }
  if (!category) {
    document.getElementById('err-category').classList.add('show');
    valid = false;
  } else {
    document.getElementById('err-category').classList.remove('show');
  }
  if (!color) {
    document.getElementById('err-color').classList.add('show');
    valid = false;
  } else {
    document.getElementById('err-color').classList.remove('show');
  }
  if (!valid) {
    showToast('にゅうりょくをかくにんしてね');
    return;
  }

  const clothes = loadClothes();

  if (editId) {
    // 編集モード
    const idx = clothes.findIndex(c => c.id === editId);
    if (idx >= 0) {
      clothes[idx].name = name;
      clothes[idx].category = category;
      clothes[idx].color = color;
      clothes[idx].season = season;
      clothes[idx].washing = washing;
      clothes[idx].fav = fav;
      if (photo) clothes[idx].photo = photo;
      saveClothesData(clothes);
      showToast('へんこうをほぞんしたよ！');
    }
  } else {
    // 新規登録
    const item = {
      id: generateId(),
      name: name,
      category: category,
      color: color,
      season: season,
      washing: washing,
      fav: fav,
      photo: photo,
      wearCount: 0,
      lastWorn: null,
      createdAt: new Date().toISOString(),
    };
    clothes.push(item);
    saveClothesData(clothes);
    showToast('とうろくしたよ！');
  }

  resetRegisterForm();
  switchScreen('list');
}

function generateId() {
  return 'c_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);
}

// ===== 服一覧 =====
let currentFilter = 'all';
function filterClothes(filter, el) {
  currentFilter = filter;
  document.querySelectorAll('#filter-bar .chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderClothesList();
}

function renderClothesList() {
  const grid = document.getElementById('clothes-grid');
  let clothes = loadClothes();

  // フィルタ適用
  if (currentFilter === 'tops') clothes = clothes.filter(c => c.category === 'tops');
  else if (currentFilter === 'bottoms') clothes = clothes.filter(c => c.category === 'bottoms');
  else if (currentFilter === 'outer') clothes = clothes.filter(c => c.category === 'outer');
  else if (currentFilter === 'washing') clothes = clothes.filter(c => c.washing);
  else if (currentFilter === 'fav') clothes = clothes.filter(c => c.fav);

  if (clothes.length === 0) {
    grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:32px; color:var(--text-light);">'
      + '<div style="font-size:48px; margin-bottom:8px;">👚</div>'
      + '<p>ふくがまだないよ</p>'
      + '<p style="font-size:12px; margin-top:4px;">とうろくしてみよう！</p></div>';
    return;
  }

  let html = '';
  clothes.forEach(item => {
    const colorObj = COLORS.find(c => c.id === item.color);
    const colorName = colorObj ? colorObj.name : '';
    html += `<div class="clothes-card" onclick="showClothesDetail('${item.id}')">
      <div class="card-photo">
        ${item.photo
          ? `<img src="${item.photo}" alt="${item.name}">`
          : `<span style="font-size:40px;">${getCategoryEmoji(item.category)}</span>`}
        <div class="card-badges">
          ${item.washing ? '<span class="badge" title="せんたく中">🫧</span>' : ''}
          ${item.fav ? '<span class="badge" title="おきにいり">⭐</span>' : ''}
        </div>
      </div>
      <div class="card-info">
        <div class="card-name">${escapeHtml(item.name)}</div>
        <div class="card-meta">${CATEGORY_NAMES[item.category] || ''} ・ ${colorName} ・ ${item.wearCount}回</div>
      </div>
    </div>`;
  });
  grid.innerHTML = html;
}

function getCategoryEmoji(cat) {
  if (cat === 'tops') return '👕';
  if (cat === 'bottoms') return '👖';
  if (cat === 'outer') return '🧥';
  return '👗';
}

// ===== 服詳細モーダル =====
function showClothesDetail(id) {
  const clothes = loadClothes();
  const item = clothes.find(c => c.id === id);
  if (!item) return;

  const colorObj = COLORS.find(c => c.id === item.color);
  const lastWornStr = item.lastWorn ? formatDate(item.lastWorn) : 'なし';

  const body = document.getElementById('detail-body');
  body.innerHTML = `
    <div class="modal-photo">
      ${item.photo
        ? `<img src="${item.photo}" alt="${item.name}">`
        : `<div style="width:100%;height:200px;display:flex;align-items:center;justify-content:center;font-size:64px;">${getCategoryEmoji(item.category)}</div>`}
    </div>
    <div class="modal-name">${escapeHtml(item.name)}</div>
    <div class="modal-details">
      <div class="detail-item"><div class="detail-label">カテゴリ</div>${CATEGORY_NAMES[item.category] || ''}</div>
      <div class="detail-item"><div class="detail-label">いろ</div>${colorObj ? colorObj.name : ''}</div>
      <div class="detail-item"><div class="detail-label">きせつ</div>${SEASON_NAMES[item.season] || ''}</div>
      <div class="detail-item"><div class="detail-label">きたかいすう</div>${item.wearCount}回</div>
      <div class="detail-item"><div class="detail-label">さいごにきた日</div>${lastWornStr}</div>
      <div class="detail-item"><div class="detail-label">じょうたい</div>${item.washing ? '🫧 せんたく中' : '✅ OK'}</div>
    </div>
    <div class="modal-actions">
      <div class="btn-group">
        <button class="btn btn-sm ${item.washing ? 'btn-accent' : 'btn-secondary'}" onclick="toggleWashing('${item.id}')" style="flex:1;">
          ${item.washing ? '✅ せんたくおわり' : '🫧 せんたく中にする'}
        </button>
        <button class="btn btn-sm ${item.fav ? 'btn-outline' : 'btn-accent'}" onclick="toggleFav('${item.id}')" style="flex:1;">
          ${item.fav ? '⭐ おきにいりかいじょ' : '⭐ おきにいり'}
        </button>
      </div>
      <button class="btn btn-sm btn-secondary" onclick="editClothing('${item.id}')" style="width:100%;">✏ へんしゅう</button>
      <button class="btn btn-sm btn-danger" onclick="deleteClothing('${item.id}')" style="width:100%;">🗑 さくじょ</button>
    </div>
  `;
  document.getElementById('detail-modal').classList.add('show');
}

function closeDetailModal(event) {
  if (event.target === document.getElementById('detail-modal') || event.target.classList.contains('modal-handle')) {
    document.getElementById('detail-modal').classList.remove('show');
  }
}

function toggleWashing(id) {
  const clothes = loadClothes();
  const item = clothes.find(c => c.id === id);
  if (!item) return;
  item.washing = !item.washing;
  saveClothesData(clothes);
  document.getElementById('detail-modal').classList.remove('show');
  renderClothesList();
  showToast(item.washing ? 'せんたく中にしたよ' : 'せんたくおわり！');
}

function toggleFav(id) {
  const clothes = loadClothes();
  const item = clothes.find(c => c.id === id);
  if (!item) return;
  item.fav = !item.fav;
  saveClothesData(clothes);
  document.getElementById('detail-modal').classList.remove('show');
  renderClothesList();
  showToast(item.fav ? 'おきにいりにしたよ⭐' : 'おきにいりかいじょ');
}

function editClothing(id) {
  const clothes = loadClothes();
  const item = clothes.find(c => c.id === id);
  if (!item) return;

  document.getElementById('detail-modal').classList.remove('show');
  resetRegisterForm();

  // フォームに値を入れる
  document.getElementById('edit-id').value = item.id;
  document.getElementById('register-title').textContent = '✏ ふくをへんしゅう';
  document.getElementById('reg-name').value = item.name;
  document.getElementById('reg-category').value = item.category;
  document.getElementById('reg-color').value = item.color;
  // 色選択
  const colorEl = document.querySelector(`#color-options .color-opt[data-color="${item.color}"]`);
  if (colorEl) colorEl.classList.add('active');
  // 季節
  document.querySelectorAll('#season-chips .chip').forEach(c => c.classList.remove('active'));
  const seasonEl = document.querySelector(`#season-chips .chip[data-season="${item.season}"]`);
  if (seasonEl) seasonEl.classList.add('active');
  // 洗濯・お気に入り
  if (item.washing) document.getElementById('reg-washing').classList.add('on');
  if (item.fav) document.getElementById('reg-fav').classList.add('on');
  // 写真
  if (item.photo) {
    const uploadEl = document.getElementById('photo-upload');
    const img = document.createElement('img');
    img.src = item.photo;
    uploadEl.appendChild(img);
    uploadEl.dataset.photo = item.photo;
  }

  switchScreen('register');
}

async function deleteClothing(id) {
  document.getElementById('detail-modal').classList.remove('show');
  const ok = await showConfirm('このふくをさくじょする？');
  if (!ok) return;
  let clothes = loadClothes();
  clothes = clothes.filter(c => c.id !== id);
  saveClothesData(clothes);
  renderClothesList();
  showToast('さくじょしたよ');
}

// ===== コーデ提案ロジック =====
function generateProposals() {
  const temp = parseInt(document.getElementById('input-temp').value) || 20;
  const weather = document.getElementById('input-weather').value;
  const whiteNg = document.querySelector('#check-white-ng input').checked;
  const outdoor = document.querySelector('#check-outdoor input').checked;

  const clothes = loadClothes();
  const history = loadHistory();

  // 条件テキスト
  const condText = `${temp}℃ / ${WEATHER_NAMES[weather]}${whiteNg ? ' / しろNG' : ''}${outdoor ? ' / そとあそび' : ''}`;
  document.getElementById('propose-condition').textContent = condText;

  // 利用可能な服を抽出（洗濯中を除外）
  let available = clothes.filter(c => !c.washing);

  // 白NG除外
  if (whiteNg) {
    available = available.filter(c => c.color !== 'white' && c.color !== 'beige');
  }

  // 現在の季節を取得
  const currentSeason = getCurrentSeason();

  // カテゴリ別に分ける
  let tops = available.filter(c => c.category === 'tops');
  let bottoms = available.filter(c => c.category === 'bottoms');
  let outers = available.filter(c => c.category === 'outer');

  // 季節フィルタ（合わない季節の服を除外、ただし候補不足なら残す）
  const seasonFilteredTops = tops.filter(c => isSeasonMatch(c.season, currentSeason));
  const seasonFilteredBottoms = bottoms.filter(c => isSeasonMatch(c.season, currentSeason));
  const seasonFilteredOuters = outers.filter(c => isSeasonMatch(c.season, currentSeason));

  if (seasonFilteredTops.length >= 3) tops = seasonFilteredTops;
  if (seasonFilteredBottoms.length >= 3) bottoms = seasonFilteredBottoms;
  if (seasonFilteredOuters.length >= 1) outers = seasonFilteredOuters;

  // アウター要否判断
  const needOuter = temp < 20;
  const mustOuter = temp < 10;

  // 各カテゴリにスコアをつける
  const today = new Date().toISOString().split('T')[0];
  const yesterday = getDateStr(-1);

  function scoreItem(item) {
    let score = 50; // ベーススコア

    // 着用回数が少ない→高スコア（偏り分散）
    const maxWear = Math.max(...clothes.map(c => c.wearCount), 1);
    score += (1 - item.wearCount / maxWear) * 20;

    // 最終着用日が古い→高スコア
    if (item.lastWorn) {
      const daysSince = daysBetween(item.lastWorn, today);
      if (daysSince === 0) score -= 40; // 今日着たら大幅減点
      else if (daysSince === 1) score -= 25; // 昨日着たら減点
      else if (daysSince <= 3) score -= 10;
      else score += Math.min(daysSince * 2, 20);
    } else {
      score += 15; // まだ着てない→ボーナス
    }

    // 気温適合
    if (temp >= 25 && item.season === 'summer') score += 10;
    if (temp >= 25 && item.season === 'winter') score -= 20;
    if (temp <= 10 && item.season === 'winter') score += 10;
    if (temp <= 10 && item.season === 'summer') score -= 20;

    // 雨の日は明るい色を少し控え（汚れやすい）
    if (weather === 'rainy' && (item.color === 'white' || item.color === 'beige')) {
      score -= 10;
    }

    // 外遊びで汚れやすい白系は下げる
    if (outdoor && (item.color === 'white' || item.color === 'beige')) {
      score -= 15;
    }

    // ランダム要素（毎回同じにならないよう）
    score += Math.random() * 10;

    return { ...item, score: score };
  }

  const scoredTops = tops.map(scoreItem).sort((a, b) => b.score - a.score);
  const scoredBottoms = bottoms.map(scoreItem).sort((a, b) => b.score - a.score);
  const scoredOuters = outers.map(scoreItem).sort((a, b) => b.score - a.score);

  // 3案を生成
  const proposals = [];
  const reasonTemplates = [
    ['いちばんおすすめ！', '🌟'],
    ['こっちもいいかも！', '💡'],
    ['こんなくみあわせは？', '🎨'],
  ];

  for (let i = 0; i < 3; i++) {
    const top = scoredTops[i] || null;
    const bottom = scoredBottoms[i] || scoredBottoms[0] || null;
    const outer = (needOuter || mustOuter) ? (scoredOuters[i] || scoredOuters[0] || null) : null;

    if (!top && !bottom) continue;

    let reasons = [];
    if (top && top.wearCount === 0) reasons.push(`${top.name}はまだきてないよ！`);
    else if (top && top.lastWorn) {
      const d = daysBetween(top.lastWorn, today);
      if (d > 7) reasons.push(`${top.name}はしばらくきてないね`);
    }
    if (temp >= 25) reasons.push('あついから、すずしいふくがいいね');
    else if (temp >= 20) reasons.push('すごしやすいきおんだね');
    else if (temp >= 10) reasons.push('すこしひんやり、うわぎがあるといいかも');
    else reasons.push('さむいから、あたたかくしよう！');

    if (weather === 'rainy') reasons.push('あめだから、よごれにくいいろがいいよ');
    if (whiteNg) reasons.push('きょうはしろNGのひ！');
    if (!outer && needOuter && outers.length === 0) reasons.push('アウターがとうろくされてないよ');

    proposals.push({
      index: i,
      label: reasonTemplates[i][0],
      icon: reasonTemplates[i][1],
      tops: top,
      bottoms: bottom,
      outer: outer,
      reason: reasons.join(' '),
    });
  }

  renderProposals(proposals, temp, weather, whiteNg, needOuter, outers.length === 0);
  switchScreen('propose');
}

function renderProposals(proposals, temp, weather, whiteNg, needOuter, noOuters) {
  const container = document.getElementById('proposals-container');

  if (proposals.length === 0) {
    container.innerHTML = `<div class="no-proposal">
      <div class="no-icon">🤔</div>
      <p>ていあんできるふくがたりないよ</p>
      <p style="font-size:12px; margin-top:6px;">トップスとボトムスをとうろくしてね</p>
      <button class="btn btn-primary mt-12" onclick="switchScreen('register')">ふくをとうろく</button>
    </div>`;
    return;
  }

  const pClasses = ['p1', 'p2', 'p3'];
  let html = '';
  proposals.forEach((p, idx) => {
    html += `<div class="proposal-card">
      <div class="proposal-header ${pClasses[idx]}">${p.icon} ${p.label}</div>
      <div class="proposal-items">`;

    // トップス
    html += renderProposalItem('トップス', p.tops);
    // ボトムス
    html += renderProposalItem('ボトムス', p.bottoms);
    // アウター
    if (needOuter) {
      html += renderProposalItem('アウター', p.outer);
    }

    html += `</div>
      <div class="proposal-reason">💬 ${escapeHtml(p.reason)}</div>
      <div class="proposal-actions">
        <button class="btn btn-sm btn-primary" onclick="adoptProposal(${idx})" style="width:100%;">
          👍 これにする！
        </button>
      </div>
    </div>`;
  });

  // 注意メッセージ
  if (noOuters && needOuter) {
    html += '<div style="text-align:center; color:var(--text-light); font-size:12px; margin-top:8px;">ℹ アウターがとうろくされていないため、アウターなしのていあんです</div>';
  }

  container.innerHTML = html;
  // グローバルに保持（採用時に使う）
  window._currentProposals = proposals;
}

function renderProposalItem(catLabel, item) {
  if (!item) {
    return `<div class="proposal-item">
      <div class="item-cat">${catLabel}</div>
      <div class="item-photo"><span style="font-size:24px; line-height:1; display:flex; align-items:center; justify-content:center; height:100%;">—</span></div>
      <div class="item-name">なし</div>
    </div>`;
  }
  return `<div class="proposal-item">
    <div class="item-cat">${catLabel}</div>
    <div class="item-photo">
      ${item.photo
        ? `<img src="${item.photo}" alt="${item.name}">`
        : `<span style="font-size:28px; line-height:1; display:flex; align-items:center; justify-content:center; height:100%;">${getCategoryEmoji(item.category)}</span>`}
    </div>
    <div class="item-name">${escapeHtml(item.name)}</div>
  </div>`;
}

// ===== 提案を採用（着用記録） =====
async function adoptProposal(idx) {
  const proposals = window._currentProposals;
  if (!proposals || !proposals[idx]) return;
  const p = proposals[idx];

  const ok = await showConfirm('このコーデにきめる？');
  if (!ok) return;

  const today = new Date().toISOString().split('T')[0];
  const clothes = loadClothes();
  const history = loadHistory();

  // 着用記録を追加
  const record = {
    date: today,
    tops: p.tops ? p.tops.id : null,
    bottoms: p.bottoms ? p.bottoms.id : null,
    outer: p.outer ? p.outer.id : null,
  };

  // 同日の既存記録をチェック
  const existIdx = history.findIndex(h => h.date === today);
  if (existIdx >= 0) {
    history[existIdx] = record;
  } else {
    history.unshift(record);
  }
  saveHistoryData(history);

  // 服のwearCountとlastWornを更新
  [p.tops, p.bottoms, p.outer].forEach(item => {
    if (!item) return;
    const ci = clothes.findIndex(c => c.id === item.id);
    if (ci >= 0) {
      clothes[ci].wearCount = (clothes[ci].wearCount || 0) + 1;
      clothes[ci].lastWorn = today;
    }
  });
  saveClothesData(clothes);

  showToast('きょうのコーデをきめたよ！🎉');
  switchScreen('home');
}

// ===== 着用履歴表示 =====
function renderHistory() {
  const container = document.getElementById('history-container');
  const emptyEl = document.getElementById('history-empty');
  const history = loadHistory();
  const clothes = loadClothes();

  if (history.length === 0) {
    container.innerHTML = '';
    emptyEl.style.display = 'block';
    return;
  }
  emptyEl.style.display = 'none';

  let html = '';
  let prevItems = {}; // 前日の服IDを記録（連続着用チェック）

  history.forEach((rec, i) => {
    const dateStr = formatDate(rec.date);
    const isToday = rec.date === new Date().toISOString().split('T')[0];
    html += `<div class="history-date">${isToday ? '📌' : '📅'} ${dateStr}${isToday ? '（きょう）' : ''}</div>`;
    html += '<div class="history-card"><div class="history-items">';

    const currentItems = {};
    ['tops', 'bottoms', 'outer'].forEach(cat => {
      const id = rec[cat];
      if (!id) return;
      currentItems[cat] = id;
      const item = clothes.find(c => c.id === id);
      if (!item) {
        html += `<div class="history-item"><div class="h-photo"><div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--text-light);">？</div></div><div class="h-name">さくじょずみ</div></div>`;
        return;
      }
      html += `<div class="history-item">
        <div class="h-photo">
          ${item.photo ? `<img src="${item.photo}">` : `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:24px;">${getCategoryEmoji(item.category)}</div>`}
        </div>
        <div class="h-name">${escapeHtml(item.name)}</div>
      </div>`;
    });

    html += '</div>';

    // 連続着用チェック（前の記録と比較）
    if (i > 0) {
      const prevRec = history[i - 1];
      const consecutive = [];
      ['tops', 'bottoms', 'outer'].forEach(cat => {
        if (rec[cat] && prevRec[cat] && rec[cat] === prevRec[cat]) {
          const item = clothes.find(c => c.id === rec[cat]);
          if (item) consecutive.push(item.name);
        }
      });
      if (consecutive.length > 0) {
        html += `<div class="consecutive-warn">⚠ れんぞくちゃくよう: ${consecutive.map(n => escapeHtml(n)).join('、')}</div>`;
      }
    }

    html += '</div>';
  });

  container.innerHTML = html;
}

// ===== ユーティリティ =====
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  try {
    const d = new Date(dateStr + 'T00:00:00');
    const m = d.getMonth() + 1;
    const day = d.getDate();
    const weekdays = ['日', '月', '火', '水', '木', '金', '土'];
    const w = weekdays[d.getDay()];
    return `${m}/${day}（${w}）`;
  } catch {
    return dateStr;
  }
}

function getDateStr(offsetDays) {
  const d = new Date();
  d.setDate(d.getDate() + offsetDays);
  return d.toISOString().split('T')[0];
}

function daysBetween(dateStr1, dateStr2) {
  const d1 = new Date(dateStr1 + 'T00:00:00');
  const d2 = new Date(dateStr2 + 'T00:00:00');
  return Math.floor(Math.abs(d2 - d1) / (1000 * 60 * 60 * 24));
}

function getCurrentSeason() {
  const m = new Date().getMonth() + 1;
  if (m >= 3 && m <= 5) return 'spring';
  if (m >= 6 && m <= 8) return 'summer';
  if (m >= 9 && m <= 11) return 'autumn';
  return 'winter';
}

function isSeasonMatch(itemSeason, currentSeason) {
  if (itemSeason === 'all') return true;
  if (itemSeason === currentSeason) return true;
  // 隣の季節も許容
  const adjacent = {
    spring: ['summer', 'winter'],
    summer: ['spring', 'autumn'],
    autumn: ['summer', 'winter'],
    winter: ['autumn', 'spring'],
  };
  return adjacent[currentSeason] && adjacent[currentSeason].includes(itemSeason);
}
